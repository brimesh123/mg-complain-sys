<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mogal Complaint System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="/css/main.css" />
</head>
<body>
  <div id="app">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <i data-lucide="wifi" class="logo-icon"></i>
          <div>
            <span class="logo-title">Mogal</span>
            <span class="logo-sub">Complaint System</span>
          </div>
        </div>
        <button class="sidebar-toggle-btn" id="sidebarToggle" aria-label="Close sidebar">
          <i data-lucide="panel-left-close"></i>
        </button>
      </div>

      <nav class="sidebar-nav">
        <a href="#dashboard"    class="nav-item" data-page="dashboard">
          <i data-lucide="layout-dashboard"></i><span>Dashboard</span>
        </a>
        <a href="#new-complaint" class="nav-item" data-page="new-complaint">
          <i data-lucide="plus-circle"></i><span>New Complaint</span>
        </a>
        <a href="#complaints"   class="nav-item" data-page="complaints">
          <i data-lucide="clipboard-list"></i><span>Complaints</span>
        </a>
        <a href="#customers"    class="nav-item" data-page="customers">
          <i data-lucide="users"></i><span>Customers</span>
        </a>
        <a href="#engineers"    class="nav-item" data-page="engineers">
          <i data-lucide="hard-hat"></i><span>Engineers</span>
        </a>
        <a href="#reports"      class="nav-item" data-page="reports">
          <i data-lucide="bar-chart-2"></i><span>Reports</span>
        </a>
        <a href="#whatsapp"     class="nav-item" data-page="whatsapp">
          <i data-lucide="message-circle"></i><span>WhatsApp</span>
          <span class="nav-wa-dot" id="navWaDot"></span>
        </a>
        <a href="#logs"         class="nav-item" data-page="logs">
          <i data-lucide="activity"></i><span>Activity Log</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="sidebar-version">v1.0.0</div>
        <div class="sync-pill" id="syncPill" title="sync.xlsx backup status">
          <i data-lucide="database" style="width:12px;height:12px;flex-shrink:0"></i>
          <span id="syncPillText">Syncing…</span>
        </div>
      </div>
    </aside>

    <!-- Main content -->
    <div class="main-wrapper" id="mainWrapper">

      <!-- Top bar -->
      <header class="topbar">
        <div class="topbar-left">
          <button class="icon-btn" id="sidebarOpenBtn" aria-label="Open sidebar">
            <i data-lucide="menu"></i>
          </button>
          <nav class="breadcrumb" id="breadcrumb">
            <span>Dashboard</span>
          </nav>
        </div>
        <div class="topbar-right">
          <div class="topbar-time" id="topbarTime"></div>
        </div>
      </header>

      <!-- Page content -->
      <main class="page-content" id="pageContent">
        <div class="page-loading">
          <div class="spinner"></div>
        </div>
      </main>

    </div>
  </div>

  <!-- Sidebar backdrop (mobile) -->
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

  <!-- Modal backdrop -->
  <div class="modal-backdrop" id="modalBackdrop"></div>

  <!-- Modal -->
  <div class="modal" id="modal" role="dialog" aria-modal="true">
    <div class="modal-box" id="modalBox">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle"></h2>
        <button class="icon-btn" id="modalClose" aria-label="Close modal">
          <i data-lucide="x"></i>
        </button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toastContainer" aria-live="polite"></div>

  <script src="/js/app.js"></script>
</body>
</html>
